<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쥐돌이쥐돌이</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR&display=swap" rel="stylesheet">
<style>
body{
  margin: 0;
  background: #ffffff;
}
.section{
  height: 150vh;
  position: relative;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
.content{
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  pointer-events: none;
}
h1{
  font-family: "IBM Plex Sans KR", sans-serif;
  font-weight: 300;
  font-size: 27px;
  padding: 20px;
  color: black;
  margin: 0;
}
.bg1 h1{ margin-top: 180px; }
.bg2 h1{ margin-top: 310px; }
.bg3 h1{ margin-top: 510px; }
.bg4 h1{ margin-top: 710px; }

.bg1{
  background-image: url('1.png');
  background-size: 10%;
  background-repeat: no-repeat;
  background-position: center;
}
.bg2{
  background-image: url('2.png');
  background-size: 25%;
  background-repeat: no-repeat;
  background-position: center;
}
.bg3{
  background-image: url('3.png');
  background-size: 40%;
  background-repeat: no-repeat;
  background-position: center;
}
.bg4{
  background-image: url('4.png');
  background-size: 55%;
  background-repeat: no-repeat;
  background-position: center;
}
.bg5 .content{
  position: sticky;
  top: 0;
}
.bg5-gif-link{
  pointer-events: auto;
  display: block;
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.bg5-gif-link img{
  width: 80vw;
  display: block;
  cursor: pointer;
}
.bg5-gif-link:hover{
  transform: scale(1.15);
}

.bg5 h1{
  position: absolute;
  bottom: 12%;
  z-index: 1;
  pointer-events: auto;
}
.bg5 h1 a{
  color: rgb(0, 0, 0);
  text-decoration: none;
  display: block;
  padding: 20px 40px;
}
.bg5 h1 a:hover{
  text-decoration: underline;
}
@keyframes colorChange{
  0%  { color: black; }
  50% { color: white; }
  100%{ color: black; }
}
.bg5 h1 a{
  animation: colorChange 1.2s infinite;
}
</style>
</head>
<body>

<section class="section bg1">
    <div class="content">
     <h1>며칠 밤을 굶은 생쥐는</h1>
   </div>
</section>

<section class="section bg2">
    <div class="content">
      <h1>달콤한 향기에 이끌려</h1>
   </div>
</section>

<section class="section bg3">
    <div class="content">
      <h1>쌀이 가득 차 있는</h1>
   </div>
</section>

<section class="section bg4">
   <div class="content">
      <h1>쌀독 안으로</h1>
    </div>
</section>

<section class="section bg5">
    <div class="content">
      <a href="next.html" class="bg5-gif-link">
        <img src="bang.gif" alt="들어간다">
     </a>
     <h1><a href="next.html">들어간다</a></h1>
   </div>
</section>

</body>
</html>
